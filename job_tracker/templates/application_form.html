{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-4">{{ "Edit Application" if application else "Add New Application" }}</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" value="{{ application['company_name'] if application else '' }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <input type="text" name="role" class="form-control" value="{{ application['role'] if application else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-control">
                            <option value="applied" {{ 'selected' if (application and application['status'] == 'applied') or not application }}>Applied</option>
                            <option value="interview" {{ 'selected' if application and application['status'] == 'interview' }}>Interview</option>
                            <option value="offer" {{ 'selected' if application and application['status'] == 'offer' }}>Offer</option>
                            <option value="rejected" {{ 'selected' if application and application['status'] == 'rejected' }}>Rejected</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Applied Date</label>
                        <input type="date" name="applied_date" class="form-control" value="{{ application['applied_date'] if application else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Link</label>
                        <input type="url" name="job_link" class="form-control" value="{{ application['job_link'] if application else '' }}" placeholder="https://...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="3">{{ application['notes'] if application else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">{{ "Update" if application else "Save Application" }}</button>
                        <a href="/" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
